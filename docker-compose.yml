version: '3.8'

# 2R Fusion - Local Development with Docker Compose
# Usage: docker-compose up --build
# Access: http://localhost:3000

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: 2r-fusion-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=file:./prisma/dev.db
      - NEXTAUTH_SECRET=dev-secret-key-minimum-32-characters-long
      - NEXTAUTH_URL=http://localhost:3000
    volumes:
      # Source code (live reload during development)
      - .:/app
      # node_modules isolation (prevents conflicts)
      - /app/node_modules
      # Database persistence
      - ./prisma/dev.db:/app/prisma/dev.db
    working_dir: /app
    command: npm run dev
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - 2r-fusion-network
    stdin_open: true
    tty: true

  # Optional: PostgreSQL database (for production simulation)
  # Uncomment to test against PostgreSQL instead of SQLite
  # db:
  #   image: postgres:16-alpine
  #   container_name: 2r-fusion-db
  #   environment:
  #     POSTGRES_USER: 2r_fusion
  #     POSTGRES_PASSWORD: dev_password_change_in_production
  #     POSTGRES_DB: 2r_fusion_dev
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U 2r_fusion"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   networks:
  #     - 2r-fusion-network

networks:
  2r-fusion-network:
    driver: bridge

volumes:
  # Uncomment if using PostgreSQL
  # postgres_data:
  #   driver: local

# Instructions:
#
# 1. Build and start services:
#    docker-compose up --build
#
# 2. Access application:
#    http://localhost:3000
#
# 3. View logs:
#    docker-compose logs -f app
#
# 4. Stop services:
#    docker-compose down
#
# 5. Reset database:
#    docker-compose down -v
#    docker-compose up --build
#
# 6. Use PostgreSQL (production-like):
#    - Uncomment 'db' service and postgres volumes below
#    - Set DATABASE_URL=postgresql://2r_fusion:dev_password_change_in_production@db:5432/2r_fusion_dev
#    - Run: docker-compose up --build
#
# 7. Access PostgreSQL directly:
#    docker exec -it 2r-fusion-db psql -U 2r_fusion -d 2r_fusion_dev
#
# 8. View container details:
#    docker ps
#    docker stats
#
